<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>IHK GAP Teil 2 — Quiz</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- ==================== START SCREEN ==================== -->
  <div id="screen-start" class="screen active">
    <div class="container">
      <header class="hero">
        <h1>IHK Prüfungsquiz</h1>
        <p class="subtitle">GAP Teil 2 — Fachinformatiker Systemintegration</p>
      </header>

      <div class="category-grid">
        <button class="cat-card" data-section="all">
          <span class="cat-icon">*</span>
          <span class="cat-name">Alle Themen</span>
          <span class="cat-count" data-count="all"></span>
        </button>
        <button class="cat-card" data-section="01-Konzeption-Administration">
          <span class="cat-icon">⚙</span>
          <span class="cat-name">Konzeption & Administration</span>
          <span class="cat-count" data-count="01-Konzeption-Administration"></span>
        </button>
        <button class="cat-card" data-section="02-Netzwerke">
          <span class="cat-icon">⇄</span>
          <span class="cat-name">Netzwerke</span>
          <span class="cat-count" data-count="02-Netzwerke"></span>
        </button>
        <button class="cat-card" data-section="03-WiSo">
          <span class="cat-icon">§</span>
          <span class="cat-name">Wirtschaft & Soziales</span>
          <span class="cat-count" data-count="03-WiSo"></span>
        </button>
      </div>

      <div class="subcategory-section" id="subcategory-section" style="display:none;">
        <h2 id="subcategory-title">Unterkategorie wählen</h2>
        <div class="subcategory-grid" id="subcategory-grid"></div>
      </div>

      <div class="start-actions">
        <button id="btn-start" class="btn btn-primary" disabled>Quiz starten</button>
      </div>

      <p class="hint">Wähle eine Kategorie, dann starte das Quiz mit 10 zufälligen Fragen.</p>
    </div>
  </div>

  <!-- ==================== QUIZ SCREEN ==================== -->
  <div id="screen-quiz" class="screen">
    <div class="container quiz-container">
      <div class="quiz-header">
        <div class="progress-info">
          <span id="quiz-progress">1 / 10</span>
          <span id="quiz-category-label" class="quiz-cat-label"></span>
        </div>
        <div class="progress-bar">
          <div class="progress-fill" id="progress-fill"></div>
        </div>
      </div>

      <div class="question-card">
        <p class="question-text" id="question-text"></p>
        <div class="options" id="options-container"></div>
      </div>

      <div class="quiz-footer">
        <button id="btn-next" class="btn btn-primary" style="display:none;">Nächste Frage</button>
      </div>
    </div>
  </div>

  <!-- ==================== RESULT SCREEN ==================== -->
  <div id="screen-result" class="screen">
    <div class="container result-container">
      <div class="result-card">
        <div class="result-score-ring">
          <svg viewBox="0 0 120 120">
            <circle class="ring-bg" cx="60" cy="60" r="52"/>
            <circle class="ring-fg" id="score-ring" cx="60" cy="60" r="52"/>
          </svg>
          <div class="result-score-text">
            <span id="result-correct">8</span><span class="result-slash">/</span><span id="result-total">10</span>
          </div>
        </div>
        <p class="result-percent" id="result-percent">80%</p>
        <p class="result-verdict" id="result-verdict">Bestanden</p>
      </div>

      <div class="result-actions">
        <button id="btn-review" class="btn btn-secondary">Falsche Antworten ansehen</button>
        <button id="btn-restart" class="btn btn-primary">Neues Quiz</button>
      </div>
    </div>
  </div>

  <!-- ==================== REVIEW SCREEN ==================== -->
  <div id="screen-review" class="screen">
    <div class="container">
      <h2 class="review-title">Auswertung</h2>
      <div id="review-list" class="review-list"></div>
      <div class="review-actions">
        <button id="btn-back-result" class="btn btn-secondary">Zurück zum Ergebnis</button>
        <button id="btn-restart-review" class="btn btn-primary">Neues Quiz</button>
      </div>
    </div>
  </div>

  <script src="questions.js"></script>
  <script src="app.js"></script>
</body>
</html>
